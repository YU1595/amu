<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>編 / amu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="experience" data-screen="select">
        <header class="app-header">
          <p class="brand">編 / amu</p>
          <div class="quiet-mark" aria-hidden="true"></div>
        </header>

        <section class="screen screen-select is-active" id="select-screen">
          <div class="copy-block">
            <p class="eyebrow">今ここに、そっと置く</p>
            <h1>今の気持ちは？</h1>
            <p class="lead">言葉にしきれなくても、ひとつ選ぶだけで大丈夫です。</p>
          </div>

          <div class="emotion-grid" id="emotion-grid" aria-label="感情を選ぶ"></div>
        </section>

        <section class="screen screen-count" id="count-screen">
          <button class="icon-button back-button" type="button" data-back aria-label="戻る">
            <span aria-hidden="true">‹</span>
          </button>

          <div class="chosen-emotion" id="chosen-emotion"></div>

          <div class="count-panel">
            <p class="count-line" id="count-line"></p>
            <div class="count-number">
              <span id="count-value">0</span>
              <span>人</span>
            </div>
          </div>

          <div class="segmented" role="tablist" aria-label="集計期間">
            <button class="segment is-active" type="button" data-period="hour" role="tab" aria-selected="true">1時間</button>
            <button class="segment" type="button" data-period="day" role="tab" aria-selected="false">24時間</button>
          </div>

          <button class="primary-button" type="button" id="show-thread">連なりを見る</button>
        </section>

        <section class="screen screen-thread" id="thread-screen">
          <button class="icon-button back-button" type="button" data-back-count aria-label="戻る">
            <span aria-hidden="true">‹</span>
          </button>

          <div class="thread-visual" aria-hidden="true">
            <svg id="thread-svg" viewBox="0 0 360 360" role="img"></svg>
          </div>

          <div class="thread-copy">
            <h2>あなたの気持ちは、今ここで誰かと重なっています。</h2>
            <p id="thread-detail"></p>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
